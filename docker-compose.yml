services:
  apache:
    image: httpd:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./server/vhosts.conf:/usr/local/apache2/conf/extra/vhosts.conf
      - ./server/certificates:/usr/local/apache2/conf/ssl
    depends_on:
      - frontend
      - backend

  #Note: expose only for tests, not for production
  frontend:
    build: ./frontend
    environment:
      - NODE_EXTRA_CA_CERTS=/app/ssl/server.cert
    volumes:
      - ./server/certificates:/app/ssl:ro
    expose:
      - "3000"

  backend:
    build: ./backend
    volumes:
      - ./server/certificates:/certificates
    expose:
      - "5000"

networks:
  default:
    driver: bridge
