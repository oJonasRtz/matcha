<VirtualHost *:80>
    ServerName localhost

    Redirect permanent "/" "https://localhost/"
</VirtualHost>

<VirtualHost *:443>

    #File upload configuration - 10Mb
    LimitRequestBody 10485760

    # SSL configuration
    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/ssl/server.cert
    SSLCertificateKeyFile /usr/local/apache2/conf/ssl/server.key

    SSLProxyEngine On
    SSLProxyCACertificateFile /usr/local/apache2/conf/ssl/server.cert

    ProxyPreserveHost On

    # frontend (Next.js)
    ProxyPass "/" "http://frontend:3000/"
    ProxyPassReverse "/" "http://frontend:3000/"

    # backend (Flask)
    ProxyPass "/api/" "https://backend:5000/"
    ProxyPassReverse "/api/" "https://backend:5000/"

</VirtualHost>
